file-upload:
  client-path: /file
  server-path: ${FILE_UPLOAD_SERVER_PATH:/app/uploads/}
  base-uri: ${FILE_UPLOAD_BASE_URI:http://localhost:9090/file}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 100MB
  application:
    name: e-commerce-api

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/codequest}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ecommerce}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres123}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8081}
  client-id: ${KEYCLOAK_CLIENT_ID:spring}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:QSQC3AM2qQsdMAPrvJ44DIrFTV9zNHFo}
  realm: ${KEYCLOAK_REALM:codequest}
